<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내신 대비 학습 대시보드</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .chart-container {
            width: 100%;
            min-height: 400px;
            position: relative;
            margin-bottom: 30px;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
        /* Hide scrollbar but allow scrolling */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom styles for GAS environment if needed */
        #root { min-height: 100vh; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide-react"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- PapaParse -->
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell 
        } = Recharts;
        const { 
            Lock, User, Calendar, ExternalLink, LogOut, Loader2, AlertCircle, TrendingUp, BookOpen, GraduationCap 
        } = LucideReact;
        const { motion, AnimatePresence } = FramerMotion;

        const SPREADSHEET_ID = "1xIlvxq4h1riV2BucwMKjcE2wmqm64xir2r_KyFTdp94";

        function App() {
            const [students, setStudents] = useState([]);
            const [allProgress, setAllProgress] = useState([]);
            const [itemLabels, setItemLabels] = useState([]);
            const [itemKeys, setItemKeys] = useState([]);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [password, setPassword] = useState("");
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        setLoading(true);
                        setError(null);

                        // Fetch Info Sheet
                        const infoUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent("정보")}`;
                        const infoRes = await fetch(infoUrl);
                        const infoCsv = await infoRes.text();
                        
                        const infoData = Papa.parse(infoCsv, { header: false }).data;
                        const headerRow = infoData[0] || [];
                        
                        const nameIdx = headerRow.indexOf("이름");
                        const schoolIdx = headerRow.indexOf("학교");
                        const gradeIdx = headerRow.indexOf("학년");
                        const dateIdx = headerRow.findIndex(col => col.startsWith("날짜("));
                        const reportIdx = headerRow.indexOf("숙제 리포트 url");
                        const pwIdx = headerRow.indexOf("비밀번호");
                        const masterPwIdx = headerRow.indexOf("마스터 비밀번호");

                        let examName = "시험";
                        if (dateIdx !== -1) {
                            const match = headerRow[dateIdx].match(/\((.*)\)/);
                            if (match) examName = match[1];
                        }

                        const parsedStudents = infoData.slice(1)
                            .filter(row => row[nameIdx !== -1 ? nameIdx : 0])
                            .map(row => ({
                                name: row[nameIdx !== -1 ? nameIdx : 0],
                                school: row[schoolIdx !== -1 ? schoolIdx : 1],
                                grade: row[gradeIdx !== -1 ? gradeIdx : 2],
                                midtermDate: row[dateIdx !== -1 ? dateIdx : 3],
                                reportUrl: row[reportIdx !== -1 ? reportIdx : 4],
                                password: row[pwIdx !== -1 ? pwIdx : 5],
                                masterPassword: row[masterPwIdx !== -1 ? masterPwIdx : -1],
                                examName: examName
                            }));
                        setStudents(parsedStudents);

                        // Fetch Progress Sheet
                        const progressUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent("진행률")}`;
                        const progressRes = await fetch(progressUrl);
                        const progressCsv = await progressRes.text();
                        
                        const progressData = Papa.parse(progressCsv, { header: false }).data;
                        const progressHeader = progressData[0] || [];
                        
                        const labels = progressHeader.slice(2).filter(label => label);
                        const keys = labels.map((_, i) => `item${i}`);
                        setItemLabels(labels);
                        setItemKeys(keys);

                        const parsedProgress = progressData.slice(1)
                            .filter(row => row[0])
                            .map(row => {
                                const data = {
                                    name: row[0],
                                    unit: row[1],
                                };
                                labels.forEach((_, i) => {
                                    const val = row[i + 2];
                                    data[`item${i}`] = val === "해당없음" ? "해당없음" : (Number(val) || 0);
                                });
                                return data;
                            });
                        setAllProgress(parsedProgress);
                    } catch (err) {
                        console.error("Data fetch error:", err);
                        setError("데이터를 불러오는 중 오류가 발생했습니다. 시트 설정을 확인해주세요.");
                    } finally {
                        setLoading(false);
                    }
                };

                fetchData();
            }, []);

            const handleLogin = () => {
                if (!selectedStudent) return;
                const inputPw = String(password);
                const studentPw = String(selectedStudent.password);
                const masterPw = String(selectedStudent.masterPassword);

                if (inputPw === studentPw || (selectedStudent.masterPassword && inputPw === masterPw)) {
                    setIsAuthenticated(true);
                } else {
                    alert("비밀번호가 일치하지 않습니다.");
                }
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                setPassword("");
                setSelectedStudent(null);
            };

            const studentProgress = useMemo(() => {
                if (!selectedStudent) return [];
                return allProgress.filter(p => p.name === selectedStudent.name);
            }, [allProgress, selectedStudent]);

            const validItemKeys = useMemo(() => {
                if (studentProgress.length === 0) return [];
                return itemKeys.filter(key => {
                    return studentProgress.some(p => p[key] !== "해당없음");
                });
            }, [studentProgress, itemKeys]);

            const unitChartData = useMemo(() => {
                return studentProgress.map(p => {
                    const values = validItemKeys
                        .map(key => p[key])
                        .filter(val => typeof val === "number");
                    const avg = values.length > 0 ? values.reduce((a, b) => a + b, 0) / values.length : 0;
                    return {
                        unit: p.unit,
                        average: Math.round(avg),
                    };
                });
            }, [studentProgress, validItemKeys]);

            const itemChartData = useMemo(() => {
                if (studentProgress.length === 0) return [];
                return validItemKeys.map((key) => {
                    const labelIndex = itemKeys.indexOf(key);
                    const values = studentProgress
                        .map(p => p[key])
                        .filter(val => typeof val === "number");
                    const avg = values.length > 0 ? values.reduce((a, b) => a + b, 0) / values.length : 0;
                    return {
                        item: itemLabels[labelIndex],
                        average: Math.round(avg),
                    };
                });
            }, [studentProgress, validItemKeys, itemKeys, itemLabels]);

            const totalProgress = useMemo(() => {
                if (studentProgress.length === 0) return 0;
                const allValues = studentProgress.flatMap(p => 
                    validItemKeys.map(key => p[key]).filter(val => typeof val === "number")
                );
                if (allValues.length === 0) return 0;
                return Math.round(allValues.reduce((a, b) => a + b, 0) / allValues.length);
            }, [studentProgress, validItemKeys]);

            const dDay = useMemo(() => {
                if (!selectedStudent?.midtermDate) return null;
                const target = new Date(selectedStudent.midtermDate);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const diff = target.getTime() - today.getTime();
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                return days;
            }, [selectedStudent]);

            if (loading) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center">
                        <div className="text-center">
                            <Loader2 className="w-10 h-10 animate-spin text-blue-600 mx-auto mb-4" />
                            <p className="text-slate-600 font-medium">데이터를 불러오고 있습니다...</p>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center">
                            <AlertCircle className="w-16 h-16 text-red-500 mx-auto mb-4" />
                            <h2 className="text-2xl font-bold text-slate-900 mb-2">오류 발생</h2>
                            <p className="text-slate-600 mb-6">{error}</p>
                            <button 
                                onClick={() => window.location.reload()}
                                className="w-full py-3 bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700 transition-colors"
                            >
                                다시 시도
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans">
                    <AnimatePresence mode="wait">
                        {!isAuthenticated ? (
                            <motion.div 
                                key="login"
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -20 }}
                                className="min-h-screen flex items-center justify-center p-4"
                            >
                                <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full border border-slate-100">
                                    <div className="text-center mb-8">
                                        <div className="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                            <GraduationCap className="w-8 h-8 text-blue-600" />
                                        </div>
                                        <h1 className="text-2xl font-bold text-slate-900">내신 대비 학습 대시보드</h1>
                                        <p className="text-slate-500 mt-2">내신 대비 학습 현황을 확인해 보세요</p>
                                    </div>

                                    <div className="space-y-6">
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-2">학생 이름</label>
                                            <div className="relative">
                                                <select 
                                                    className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none appearance-none transition-all"
                                                    onChange={(e) => {
                                                        const student = students.find(s => s.name === e.target.value);
                                                        setSelectedStudent(student || null);
                                                    }}
                                                    value={selectedStudent?.name || ""}
                                                >
                                                    <option value="">학생을 선택해 주세요</option>
                                                    {students.map(s => (
                                                        <option key={s.name} value={s.name}>{s.name}</option>
                                                    ))}
                                                </select>
                                                <User className="absolute left-3 top-3.5 w-5 h-5 text-slate-400" />
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-2">등원번호</label>
                                            <div className="relative">
                                                <input 
                                                    type="password"
                                                    placeholder="등원번호를 입력해 주세요"
                                                    className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                                                    value={password}
                                                    onChange={(e) => setPassword(e.target.value)}
                                                    onKeyDown={(e) => e.key === "Enter" && handleLogin()}
                                                />
                                                <Lock className="absolute left-3 top-3.5 w-5 h-5 text-slate-400" />
                                            </div>
                                        </div>

                                        <button 
                                            onClick={handleLogin}
                                            disabled={!selectedStudent || !password}
                                            className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed transition-all shadow-lg shadow-blue-200"
                                        >
                                            확인하기
                                        </button>
                                    </div>
                                </div>
                            </motion.div>
                        ) : (
                            <motion.div 
                                key="dashboard"
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                className="max-w-6xl mx-auto p-4 md:p-8 space-y-8"
                            >
                                {/* Header */}
                                <header className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                    <div className="space-y-2">
                                        <div className="flex items-center gap-2 text-blue-600 font-semibold">
                                            <BookOpen className="w-5 h-5" />
                                            <span>{selectedStudent?.school} {selectedStudent?.grade}</span>
                                        </div>
                                        <h1 className="text-2xl md:text-3xl font-bold text-slate-900">
                                            {selectedStudent?.name} 학생 내신 대비
                                        </h1>
                                    </div>

                                    <div className="flex items-center gap-3">
                                        {selectedStudent?.reportUrl && (
                                            <a 
                                                href={selectedStudent.reportUrl}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="px-4 py-3 bg-blue-50 text-blue-600 rounded-2xl hover:bg-blue-100 transition-all shadow-sm border border-blue-100 flex items-center justify-center gap-2"
                                                title="숙제 리포트 보기"
                                            >
                                                <ExternalLink className="w-6 h-6" />
                                                <span className="font-semibold text-sm">숙제 리포트</span>
                                            </a>
                                        )}

                                        <button 
                                            onClick={handleLogout}
                                            className="p-3 bg-slate-100 text-slate-600 rounded-2xl hover:bg-red-50 hover:text-red-600 transition-all flex items-center justify-center"
                                            title="로그아웃"
                                        >
                                            <LogOut className="w-6 h-6" />
                                        </button>
                                    </div>
                                </header>

                                {/* Stats & Charts Grid */}
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    {/* 1. D-Day Block */}
                                    <div className="order-1">
                                        <div className="bg-blue-50 p-6 rounded-3xl shadow-sm border border-blue-100 flex items-center justify-between h-full">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shrink-0">
                                                    <Calendar className="w-6 h-6" />
                                                </div>
                                                <div>
                                                    <p className="text-blue-600 font-medium text-sm md:text-base">지필평가 D-Day</p>
                                                    <h3 className="text-lg md:text-2xl font-bold text-slate-900">{selectedStudent?.examName || "시험"}까지</h3>
                                                </div>
                                            </div>
                                            <div className="text-2xl md:text-4xl font-black text-blue-600">
                                                {dDay !== null ? (dDay > 0 ? `D-${dDay}` : dDay === 0 ? "D-Day" : `D+${Math.abs(dDay)}`) : "-"}
                                            </div>
                                        </div>
                                    </div>

                                    {/* 2. Total Progress Block */}
                                    <div className="order-2">
                                        <div className="bg-indigo-50 p-6 rounded-3xl shadow-sm border border-indigo-100 flex items-center justify-between h-full">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shrink-0">
                                                    <TrendingUp className="w-6 h-6" />
                                                </div>
                                                <div>
                                                    <p className="text-indigo-600 font-medium text-sm md:text-base">전체 진행률</p>
                                                    <h3 className="text-lg md:text-2xl font-bold text-slate-900">학습 완성도</h3>
                                                </div>
                                            </div>
                                            <div className="text-2xl md:text-4xl font-black text-indigo-600">
                                                {totalProgress}%
                                            </div>
                                        </div>
                                    </div>

                                    {/* 3. Unit-wise Chart */}
                                    <div className="order-3">
                                        <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 h-full">
                                            <div className="flex items-center gap-3 mb-8">
                                                <div className="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center">
                                                    <TrendingUp className="w-5 h-5 text-blue-600" />
                                                </div>
                                                <div>
                                                    <h2 className="text-xl font-bold text-slate-900">단원별 진행률</h2>
                                                    <p className="text-sm text-slate-500">진행 정도</p>
                                                </div>
                                            </div>
                                            <div className="chart-container">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <BarChart data={unitChartData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                        <XAxis 
                                                            dataKey="unit" 
                                                            axisLine={false} 
                                                            tickLine={false} 
                                                            tick={{ fill: '#64748b', fontSize: 12 }} 
                                                            dy={10}
                                                        />
                                                        <YAxis 
                                                            domain={[0, 100]} 
                                                            axisLine={false} 
                                                            tickLine={false} 
                                                            tick={{ fill: '#64748b', fontSize: 12 }} 
                                                        />
                                                        <Tooltip 
                                                            cursor={{ fill: '#f8fafc' }}
                                                            formatter={(value) => [`${value}%`, "수행률"]}
                                                            contentStyle={{ 
                                                                borderRadius: '16px', 
                                                                border: 'none', 
                                                                boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)',
                                                                padding: '12px'
                                                            }}
                                                        />
                                                        <Bar 
                                                            dataKey="average" 
                                                            radius={[6, 6, 0, 0]} 
                                                            barSize={40}
                                                        >
                                                            {unitChartData.map((entry, index) => (
                                                                <Cell key={`cell-${index}`} fill={entry.average >= 80 ? '#2563eb' : entry.average >= 50 ? '#60a5fa' : '#93c5fd'} />
                                                            ))}
                                                        </Bar>
                                                    </BarChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 4. Item-wise Chart */}
                                    <div className="order-4">
                                        <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 h-full">
                                            <div className="flex items-center gap-3 mb-8">
                                                <div className="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center">
                                                    <BookOpen className="w-5 h-5 text-indigo-600" />
                                                </div>
                                                <div>
                                                    <h2 className="text-xl font-bold text-slate-900">항목별 진행률</h2>
                                                    <p className="text-sm text-slate-500">진행 정도</p>
                                                </div>
                                            </div>
                                            <div className="chart-container">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <BarChart 
                                                        data={itemChartData} 
                                                        layout="vertical" 
                                                        margin={{ top: 0, right: 20, left: -10, bottom: 0 }}
                                                    >
                                                        <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke="#f1f5f9" />
                                                        <XAxis 
                                                            type="number" 
                                                            domain={[0, 100]} 
                                                            axisLine={false} 
                                                            tickLine={false} 
                                                            tick={{ fill: '#64748b', fontSize: 12 }} 
                                                        />
                                                        <YAxis 
                                                            dataKey="item" 
                                                            type="category" 
                                                            axisLine={false} 
                                                            tickLine={false} 
                                                            tick={{ fill: '#475569', fontSize: 10, fontWeight: 500 }} 
                                                            width={70}
                                                        />
                                                        <Tooltip 
                                                            cursor={{ fill: '#f8fafc' }}
                                                            formatter={(value) => [`${value}%`, "수행률"]}
                                                            contentStyle={{ 
                                                                borderRadius: '16px', 
                                                                border: 'none', 
                                                                boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)',
                                                                padding: '12px'
                                                            }}
                                                        />
                                                        <Bar 
                                                            dataKey="average" 
                                                            radius={[0, 6, 6, 0]} 
                                                            barSize={20}
                                                        >
                                                            {itemChartData.map((entry, index) => (
                                                                <Cell key={`cell-${index}`} fill={entry.average >= 80 ? '#4f46e5' : entry.average >= 50 ? '#818cf8' : '#c7d2fe'} />
                                                            ))}
                                                        </Bar>
                                                    </BarChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Detail Table */}
                                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="p-6 border-b border-slate-50">
                                        <h3 className="font-bold text-slate-900">단원별 한 눈에 보기</h3>
                                    </div>
                                    
                                    {/* Desktop Table */}
                                    <div className="hidden md:block overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50">
                                                    <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">단원</th>
                                                    {validItemKeys.map(key => {
                                                        const labelIndex = itemKeys.indexOf(key);
                                                        return (
                                                            <th key={key} className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">
                                                                {itemLabels[labelIndex]}
                                                            </th>
                                                        );
                                                    })}
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {studentProgress.map((p, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-4 font-semibold text-slate-700 whitespace-nowrap">{p.unit}</td>
                                                        {validItemKeys.map(key => {
                                                            const val = p[key];
                                                            if (val === "해당없음") {
                                                                return (
                                                                    <td key={key} className="p-4 text-center text-slate-300 font-medium">-</td>
                                                                );
                                                            }
                                                            
                                                            let label = "진행";
                                                            let colorClass = "bg-yellow-50 text-yellow-700";
                                                            if (typeof val === "number") {
                                                                if (val >= 100) {
                                                                    label = "완료";
                                                                    colorClass = "bg-green-50 text-green-700";
                                                                } else if (val <= 0) {
                                                                    label = "예정";
                                                                    colorClass = "bg-slate-100 text-slate-500";
                                                                }
                                                            }

                                                            return (
                                                                <td key={key} className="p-4 text-center">
                                                                    <span className={`inline-block px-3 py-1 rounded-lg text-xs font-bold ${colorClass}`}>
                                                                        {label}
                                                                    </span>
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>

                                    {/* Mobile Transposed Table */}
                                    <div className="md:hidden overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50">
                                                    <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider sticky left-0 bg-slate-50 z-10">항목</th>
                                                    {studentProgress.map((p, idx) => (
                                                        <th key={idx} className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center whitespace-nowrap">{p.unit}</th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {validItemKeys.map((key) => {
                                                    const labelIndex = itemKeys.indexOf(key);
                                                    return (
                                                        <tr key={key} className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-4 font-semibold text-slate-700 text-sm whitespace-nowrap sticky left-0 bg-white z-10 border-r border-slate-50">
                                                                {itemLabels[labelIndex]}
                                                            </td>
                                                            {studentProgress.map((p, pIdx) => {
                                                                const val = p[key];
                                                                if (val === "해당없음") {
                                                                    return (
                                                                        <td key={pIdx} className="p-4 text-center text-slate-300 font-medium">-</td>
                                                                    );
                                                                }

                                                                let label = "진행";
                                                                let colorClass = "bg-yellow-50 text-yellow-700";
                                                                if (typeof val === "number") {
                                                                    if (val >= 100) {
                                                                        label = "완료";
                                                                        colorClass = "bg-green-50 text-green-700";
                                                                    } else if (val <= 0) {
                                                                        label = "예정";
                                                                        colorClass = "bg-slate-100 text-slate-500";
                                                                    }
                                                                }

                                                                return (
                                                                    <td key={pIdx} className="p-4 text-center">
                                                                        <span className={`inline-block px-3 py-1 rounded-lg text-[10px] font-bold ${colorClass}`}>
                                                                            {label}
                                                                        </span>
                                                                    </td>
                                                                );
                                                            })}
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <footer className="text-center text-slate-400 text-sm py-8">
                                    &copy; 2026 Academic Achievement Dashboard. All rights reserved.
                                </footer>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
